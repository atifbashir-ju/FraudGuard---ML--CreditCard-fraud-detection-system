version: '3.9'

services:
  fastapi:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app

  django:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=src.dashboard.settings
      - FASTAPI_URL=http://fastapi:8001
    depends_on:
      - fastapi
