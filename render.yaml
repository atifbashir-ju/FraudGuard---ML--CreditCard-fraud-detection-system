services:
  - type: web
    name: fraudguard
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        value: fraudguard-secret-key-2024
      - key: DEBUG
        value: "False"
